{{- if .Values.monitoring.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-backend-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    release: {{ .Values.monitoring.release }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: backend
  endpoints:
  - port: http
    path: /metrics
    interval: {{ .Values.monitoring.interval }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-frontend-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
    release: {{ .Values.monitoring.release }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: frontend
  endpoints:
  - port: http
    path: /api/metrics
    interval: {{ .Values.monitoring.interval }}
---
# The worker doesn't have a service by default because it's an async background processor.
# However, ServiceMonitors require a Service to discover the Pods (or we can use PodMonitor).
# To keep things standardized with existing charts, we can create a simple headless service for the worker,
# or create a PodMonitor. A PodMonitor is generally cleaner for headless workers.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-worker-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
    release: {{ .Values.monitoring.release }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: worker
  podMetricsEndpoints:
  - port: metrics
    path: /metrics
    interval: {{ .Values.monitoring.interval }}
---
# PodMonitor for Istio sidecars (Envoy stats)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-istio-sidecar-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    release: {{ .Values.monitoring.release }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      security.istio.io/tlsMode: istio
  podMetricsEndpoints:
  - path: /stats/prometheus
    targetPort: {{ .Values.monitoring.istio.sidecarStatsPort }}
    interval: {{ .Values.monitoring.interval }}
---
# ServiceMonitor for MinIO
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-minio-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "resilient-platform.fullname" . }}-{{ .Values.minio.host }}
    release: {{ .Values.monitoring.release }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: {{ include "resilient-platform.fullname" . }}-{{ .Values.minio.host }}
  endpoints:
  - port: {{ include "resilient-platform.fullname" . }}-{{ .Values.minio.host }}-api
    path: /minio/v2/metrics/cluster
    interval: {{ .Values.monitoring.interval }}

{{- if .Values.postgres.exporter.enabled }}
---
# ServiceMonitor for Postgres Exporter
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-postgres-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "resilient-platform.fullname" . }}-{{ .Values.postgres.host }}
    release: {{ .Values.monitoring.release }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: {{ include "resilient-platform.fullname" . }}-{{ .Values.postgres.host }}
  endpoints:
  - port: {{ include "resilient-platform.fullname" . }}-{{ .Values.postgres.host }}-metrics
    interval: {{ .Values.monitoring.interval }}
{{- end }}

{{- if .Values.redis.exporter.enabled }}
---
# ServiceMonitor for Redis Exporter
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-redis-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "resilient-platform.fullname" . }}-{{ .Values.redis.host }}
    release: {{ .Values.monitoring.release }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: {{ include "resilient-platform.fullname" . }}-{{ .Values.redis.host }}
  endpoints:
  - port: {{ include "resilient-platform.fullname" . }}-{{ .Values.redis.host }}-metrics
    interval: {{ .Values.monitoring.interval }}
{{- end }}

---
# PeerAuthentication for all metrics ports to allow Prometheus scraping in STRICT mTLS ns
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: {{ include "resilient-platform.fullname" . }}-metrics-permissive
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  portLevelMtls:
    {{ .Values.backend.port | default 5001 }}:
      mode: PERMISSIVE
    {{ .Values.worker.port | default 8000 }}:
      mode: PERMISSIVE
    {{ .Values.monitoring.istio.sidecarStatsPort }}:
      mode: PERMISSIVE
    {{ .Values.minio.port | default 9000 }}:
      mode: PERMISSIVE
    {{- if .Values.postgres.exporter.enabled }}
    {{ .Values.postgres.exporter.port }}:
      mode: PERMISSIVE
    {{- end }}
    {{- if .Values.redis.exporter.enabled }}
    {{ .Values.redis.exporter.port }}:
      mode: PERMISSIVE
    {{- end }}
{{- end -}}
