apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-backend-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    # Note: Kube-prometheus-stack usually looks for ServiceMonitors across all namespaces, or those with a specific label.
    release: kube-prometheus-stack # default selector for the helm chart 
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: backend
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-frontend-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: frontend
  endpoints:
  - port: http
    path: /api/metrics
    interval: 15s
---
# The worker doesn't have a service by default because it's an async background processor.
# However, ServiceMonitors require a Service to discover the Pods (or we can use PodMonitor).
# To keep things standardized with existing charts, we can create a simple headless service for the worker,
# or create a PodMonitor. A PodMonitor is generally cleaner for headless workers.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "resilient-platform.fullname" . }}-worker-monitor
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: worker
  podMetricsEndpoints:
  - port: metrics # Need to define this port in the deployment template
    path: /metrics
    interval: 15s
---
# WHY THESE PeerAuthentication POLICIES EXIST:
#
# The resilient-platform namespace enforces Istio STRICT mTLS, meaning all
# inbound traffic must use mTLS. Prometheus scrapes over plain HTTP.
# Without these exceptions, Prometheus gets "connection reset by peer" and
# the backend/worker targets show as DOWN — causing all Grafana panels to
# be empty.
#
# Solution: port-level PERMISSIVE on the specific metrics ports only.
# All other ports (backend :5001 for API traffic, etc.) remain STRICT.
# This follows the same pattern already used for the frontend.
#
# Ref: https://istio.io/latest/docs/tasks/observability/metrics/prometheus/
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: {{ include "resilient-platform.fullname" . }}-backend-metrics-permissive
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: backend
  # Namespace default is STRICT (from resilient-platform-default PeerAuthentication).
  # Override for the metrics port only — Prometheus scrapes in plaintext.
  portLevelMtls:
    5001:
      mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: {{ include "resilient-platform.fullname" . }}-worker-metrics-permissive
  labels:
    {{- include "resilient-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "resilient-platform.name" . }}
      app.kubernetes.io/component: worker
  # Worker starts prometheus_client.start_http_server(8000) — plaintext HTTP.
  # PERMISSIVE on port 8000 only so Prometheus can scrape it.
  portLevelMtls:
    8000:
      mode: PERMISSIVE
